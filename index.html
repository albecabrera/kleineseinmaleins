<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5-Minuten Einmaleins-Test</title>
<style>
  @page { size: A4 landscape; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #d8d8d8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  button {
    padding: 10px 24px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  button:hover { background: #333; }
  button:active { transform: scale(0.97); }

  /* ── A4 Landscape sheet ── */
  .sheet {
    background: #fff;
    width: 297mm;
    height: 210mm;
    padding: 8mm 10mm 12mm;
    box-shadow: 0 6px 32px rgba(0,0,0,0.28);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 6px;
    border-bottom: 3px solid #000;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .fox-logo { width: 50px; height: 50px; flex-shrink: 0; }

  .title-block { flex: 1; }

  .title-main {
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #000;
    line-height: 1.1;
  }

  .title-sub {
    font-size: 0.6rem;
    color: #555;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  .meta-fields {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .meta-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .meta-field {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.62rem;
    font-weight: 700;
    color: #000;
    white-space: nowrap;
  }

  .meta-line {
    border-bottom: 1.5px solid #000;
    height: 12px;
  }

  /* ── Questions grid ── */
  .questions {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(12, 1fr);
    grid-auto-flow: column;
    gap: 3px 5px;
    flex: 1;
    min-height: 0;
  }

  .qcard {
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 2px 5px 3px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .qcard .qnum {
    font-size: 0.5rem;
    color: #aaa;
    font-weight: 700;
    line-height: 1;
  }

  .qcard .qtext {
    font-size: 0.82rem;
    font-weight: 900;
    color: #000;
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 5px;
    margin: 2px 0 1px;
  }

  .qcard .answer-blank {
    border-bottom: 1.5px solid #333;
    min-width: 32px;
    height: 14px;
    display: inline-block;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  .footer {
    flex-shrink: 0;
    border-top: 2.5px solid #000;
    margin-top: 5px;
    padding-top: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-hint {
    font-size: 0.55rem;
    color: #aaa;
  }

  .score-row {
    display: flex;
    align-items: baseline;
    gap: 7px;
    font-size: 0.88rem;
    font-weight: 800;
    color: #000;
  }

  .score-blank {
    display: inline-block;
    border-bottom: 2px solid #000;
    width: 60px;
    height: 14px;
  }

  .score-denom {
    font-size: 0.75rem;
    font-weight: 700;
  }

  /* ── Solution sheet — screen: hidden, print: page 2 ── */
  .solution-sheet {
    display: none;
  }

  .solution-sheet .qcard {
    background: #fafafa;
  }

  .qcard .answer-filled {
    font-weight: 900;
    color: #000;
    font-size: 0.82rem;
  }

  .solution-label {
    display: inline-block;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: #000;
    color: #fff;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── Print ── */
  @media print {
    body { background: #fff; padding: 0; display: block; }
    .controls, .print-note { display: none !important; }
    .solution-sheet { display: block; }
    .sheet {
      width: 297mm;
      height: 210mm;
      box-shadow: none;
      padding: 8mm 10mm 12mm;
      overflow: hidden;
    }
    .sheet:first-of-type {
      page-break-after: always;
    }
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="generate()">🔀 Neu generieren</button>
  <button onclick="window.print()">🖨️ Drucken / PDF</button>
</div>

<div class="sheet">

  <!-- ── Header ── -->
  <div class="header">

    <!-- Kluger Fuchs SVG -->
    <svg class="fox-logo" viewBox="0 0 100 105" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Left ear -->
      <polygon points="14,58 28,10 46,52" fill="white" stroke="black" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="19,55 28,24 41,50" fill="black"/>
      <!-- Right ear -->
      <polygon points="54,52 72,10 86,58" fill="white" stroke="black" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="59,50 72,24 81,55" fill="black"/>
      <!-- Head -->
      <ellipse cx="50" cy="72" rx="36" ry="28" fill="white" stroke="black" stroke-width="3"/>
      <!-- Snout -->
      <ellipse cx="50" cy="85" rx="15" ry="9" fill="white" stroke="black" stroke-width="2"/>
      <!-- Nose -->
      <ellipse cx="50" cy="81" rx="5" ry="3.5" fill="black"/>
      <!-- Mouth -->
      <path d="M43,90 Q50,96 57,90" stroke="black" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <!-- Glasses left lens -->
      <circle cx="34" cy="67" r="9.5" fill="white" stroke="black" stroke-width="2"/>
      <!-- Glasses right lens -->
      <circle cx="66" cy="67" r="9.5" fill="white" stroke="black" stroke-width="2"/>
      <!-- Bridge -->
      <line x1="43.5" y1="67" x2="56.5" y2="67" stroke="black" stroke-width="2"/>
      <!-- Temple arms -->
      <line x1="24.5" y1="65" x2="17" y2="61" stroke="black" stroke-width="2"/>
      <line x1="75.5" y1="65" x2="83" y2="61" stroke="black" stroke-width="2"/>
      <!-- Pupils -->
      <circle cx="34" cy="67" r="4.5" fill="black"/>
      <circle cx="66" cy="67" r="4.5" fill="black"/>
      <!-- Eye shine -->
      <circle cx="36" cy="65" r="1.5" fill="white"/>
      <circle cx="68" cy="65" r="1.5" fill="white"/>
    </svg>

    <div class="title-block">
      <div class="title-main">5-Minuten Einmaleins-Test</div>
    </div>

    <div class="meta-fields">
      <div class="meta-row">
        <div class="meta-field">
          Name: <div class="meta-line" style="width:120px"></div>
        </div>
        <div class="meta-field" style="margin-left:16px">
          Datum: <div class="meta-line" style="width:90px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Questions ── -->
  <div class="questions" id="grid"></div>

  <!-- ── Footer ── -->
  <div class="footer">
    <div class="score-row">
      Anzahl richtiger Aufgaben:
      <span class="score-blank"></span>
      <span class="score-denom">/ 72</span>
    </div>
  </div>

</div>

<!-- ── Lösungsblatt ── -->
<div class="sheet solution-sheet" style="margin-top: 20px;">

  <div class="header">
    <svg class="fox-logo" viewBox="0 0 100 105" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="14,58 28,10 46,52" fill="white" stroke="black" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="19,55 28,24 41,50" fill="black"/>
      <polygon points="54,52 72,10 86,58" fill="white" stroke="black" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="59,50 72,24 81,55" fill="black"/>
      <ellipse cx="50" cy="72" rx="36" ry="28" fill="white" stroke="black" stroke-width="3"/>
      <ellipse cx="50" cy="85" rx="15" ry="9" fill="white" stroke="black" stroke-width="2"/>
      <ellipse cx="50" cy="81" rx="5" ry="3.5" fill="black"/>
      <path d="M43,90 Q50,96 57,90" stroke="black" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <circle cx="34" cy="67" r="9.5" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="66" cy="67" r="9.5" fill="white" stroke="black" stroke-width="2"/>
      <line x1="43.5" y1="67" x2="56.5" y2="67" stroke="black" stroke-width="2"/>
      <line x1="24.5" y1="65" x2="17" y2="61" stroke="black" stroke-width="2"/>
      <line x1="75.5" y1="65" x2="83" y2="61" stroke="black" stroke-width="2"/>
      <circle cx="34" cy="67" r="4.5" fill="black"/>
      <circle cx="66" cy="67" r="4.5" fill="black"/>
      <circle cx="36" cy="65" r="1.5" fill="white"/>
      <circle cx="68" cy="65" r="1.5" fill="white"/>
    </svg>

    <div class="title-block">
      <div class="title-main">5-Minuten Einmaleins-Test <span class="solution-label">Lösungsblatt</span></div>
    </div>

    <div class="meta-fields">
      <div class="meta-row">
        <div class="meta-field">
          Name: <div class="meta-line" style="width:120px"></div>
        </div>
        <div class="meta-field" style="margin-left:16px">
          Datum: <div class="meta-line" style="width:90px"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="questions" id="solution-grid"></div>

  <div class="footer">
    <div class="score-row">
      Anzahl richtiger Aufgaben:
      <span class="score-blank"></span>
      <span class="score-denom">/ 72</span>
    </div>
  </div>

</div>

<p class="print-note" style="margin-top:10px;font-size:0.65rem;color:#999;text-align:center;">
  Querformat A4 · Seitenränder auf „Keine" setzen beim Drucken
</p>

<script>
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generate() {
    const grid = document.getElementById('grid');
    const solutionGrid = document.getElementById('solution-grid');
    grid.innerHTML = '';
    solutionGrid.innerHTML = '';

    // Tables 2–9, factors 2–10 → 72 questions
    const questions = shuffle(
      [2, 3, 4, 5, 6, 7, 8, 9].flatMap(m =>
        [2, 3, 4, 5, 6, 7, 8, 9, 10].map(f => ({ m, f }))
      )
    );

    questions.forEach((q, idx) => {
      const card = document.createElement('div');
      card.className = 'qcard';
      card.innerHTML = `
        <div class="qnum">${idx + 1}.</div>
        <div class="qtext">${q.m} &times; ${q.f} = <span class="answer-blank"></span></div>
      `;
      grid.appendChild(card);

      const sol = document.createElement('div');
      sol.className = 'qcard';
      sol.innerHTML = `
        <div class="qnum">${idx + 1}.</div>
        <div class="qtext">${q.m} &times; ${q.f} = <span class="answer-filled">${q.m * q.f}</span></div>
      `;
      solutionGrid.appendChild(sol);
    });
  }

  generate();
</script>
</body>
</html>
